# ============================================
# CONFIGURACIÓN DE PRODUCCIÓN - MICROFARMA
# ============================================
# NOTA: Usa variables de entorno para credenciales
# No versionar este archivo con datos sensibles

spring.application.name=MicrofarmaHorarios

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/microfarmahorarios?zeroDateTimeBehavior=convertToNull}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=${SERVER_PORT:8082}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================
# JWT SECURITY CONFIGURATION
# ============================================
# Use strong 256+ character keys in production
jwt.secret=${JWT_SECRET:changeMe_UseEnvVariable_Min256Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================
# EMAIL CONFIGURATION
# ============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.MicrofarmaHorarios=INFO
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/microfarma.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================================
# ACTUATOR ENDPOINTS
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator

# ============================================
# SPRING CONFIGURATION
# ============================================
spring.main.allow-circular-references=false
spring.lifecycle.timeout-per-shutdown-phase=30s
